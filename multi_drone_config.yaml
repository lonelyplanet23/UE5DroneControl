# 多无人机配置文件
# 每个无人机需要配置：SSH连接信息 + UE5端口

# 注意：实际硬件配置
#   px4_1: IP=192.168.30.104, MAVLink ID=2
#   px4_2: IP=192.168.30.102, MAVLink ID=3
#   px4_3: IP=192.168.30.103, MAVLink ID=4
# (之前的102是px4_2，不是px4_1)

drones:
  # 无人机 1 (px4_1)
  - name: "UAV1"
    drone_id: 1                    # 内部标识ID
    mavlink_system_id: 2           # MAVLink system ID (对应px4_1)
    topic_prefix: "/px4_1"
    ssh_host: "192.168.30.104"     # 实际IP地址
    ssh_user: "jetson1"
    ssh_password: "123456"
    ros_topic: "/px4_1/fmu/out/vehicle_odometry"
    ue_host: "127.0.0.1"
    ue_port: 8888                 # UE5接收odometry的端口

  # 无人机 2 (px4_2)
  - name: "UAV2"
    drone_id: 2
    mavlink_system_id: 3
    topic_prefix: "/px4_2"
    ssh_host: "192.168.30.102"
    ssh_user: "jetson2"
    ssh_password: "123456"
    ros_topic: "/px4_2/fmu/out/vehicle_odometry"
    ue_host: "127.0.0.1"
    ue_port: 8890

  # 无人机 3 (px4_3)
  - name: "UAV3"
    drone_id: 3
    mavlink_system_id: 4
    topic_prefix: "/px4_3"
    ssh_host: "192.168.30.103"
    ssh_user: "jetson3"
    ssh_password: "123456"
    ros_topic: "/px4_3/fmu/out/vehicle_odometry"
    ue_host: "127.0.0.1"
    ue_port: 8892

# 主控制器配置
controller:
  listen_port: 8899           # UE5发送控制指令的统一端口
  forward_to_ports: [8889, 8891, 8893]  # 转发到各单机桥接的端口
  safety_limits:
    max_altitude: 100.0
    min_altitude: 1.0
    max_horizontal_distance: 500.0

# 网络设置
network:
  skip_network_check: false
  skip_ssh_check: false

# 网络设置
network:
  skip_network_check: false  # 是否跳过网络连接检查
  skip_ssh_check: false      # 是否跳过 SSH 连接检查
