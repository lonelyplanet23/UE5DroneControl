; ---- Cesium 瓦片磁盘缓存配置 ----
; 联网时运行会自动缓存请求过的瓦片，断网后可复用缓存
; 先在联网状态下进入 CesiumWorld 关卡，浏览目标区域，缓存填充后断网即可离线使用
[/Script/CesiumRuntime.CesiumRuntimeSettings]
MaxCacheBytes=1073741824
MaxCacheItems=16384

; 离线地图：UseLocalTileServer=true 时，DroneOps 关卡启动后将所有 Cesium tileset/raster overlay
; 切换到本地 tile server（修改后需重启 UE 或重进关卡生效）；false 时使用在线 Cesium ion / Google 源
[CesiumTileServer]
UseLocalTileServer=true
; 奥维 WEB 瓦片服务只有 2D 影像瓦片，没有 tileset.json；保持 3D Tileset 在线/原配置，只替换 raster overlay。
SwitchTilesetsToLocal=false
; UE ini 会把 http:// 里的 // 当作注释截断；这里不写协议，代码会自动补 http://。
LocalTileServerUrl=127.0.0.1:8870
; 当前关卡若只有 CesiumIonRasterOverlay，会在运行时自动创建 URL Template Overlay，并关闭原在线影像 overlay。
CreateUrlTemplateRasterOverlay=true
DisableNonUrlRasterOverlays=true
; 奥维 205: 【企业全球】高清混合卫星图 大字。这里用 $z/$x/$y，代码会转换成 Cesium URL Template 的 {z}/{x}/{y}。
RasterTemplateUrl=127.0.0.1:8870/getomap_205_$z_$x_$y_0_0.jpg
RasterProjection=WebMercator
RasterTileWidth=512
RasterTileHeight=512
RasterMinimumLevel=9
RasterMaximumLevel=18
; 围绕 CesiumGeoreference 原点预热附近瓦片，减少移动视角时的空白/慢加载。
PrefetchLocalRasterTiles=true
PrefetchMinimumLevel=16
PrefetchMaximumLevel=18
PrefetchRadius=4
PrefetchMaxRequests=240
; 仅用 2D 离线卫星图时，在保存的中心点海拔处生成水平瓦片平面，不依赖在线 Cesium/Google 3D Tiles。
UseOfflineRasterPlane=true
UseOfflineRasterPlaneLod=true
; LOD 策略：远处低 zoom 大瓦片打底，近处高 zoom 小瓦片覆盖，兼顾范围和清晰度。
OfflineRasterPlaneFarZoom=16
OfflineRasterPlaneFarRadius=8
OfflineRasterPlaneMidZoom=17
OfflineRasterPlaneMidRadius=6
OfflineRasterPlaneNearZoom=18
OfflineRasterPlaneNearRadius=4
; UseOfflineRasterPlaneLod=false 时回退到下面的单层瓦片设置。
OfflineRasterPlaneZoom=18
OfflineRasterPlaneRadius=4
OfflineRasterPlaneMaxTiles=1200
OfflineRasterPlaneVerticalOffsetCm=0
OfflineRasterPlaneLodVerticalStepCm=2
OfflineRasterPlaneDynamicCoverage=true
OfflineRasterPlaneDynamicUpdateInterval=1.0
OfflineRasterPlaneCoveragePaddingTiles=2
OfflineRasterPlaneMaxDynamicRadius=32
OfflineRasterPlaneFootprintScale=1.35
OfflineRasterPlaneCollision=true
OfflineRasterPlaneMaterial=/Game/DroneOps/Materials/M_OfflineRasterTile.M_OfflineRasterTile
; 如果材质里有 TileBrightness 标量参数，可用它压低 Unlit 底图亮度，减少画面曝光带偏。
OfflineRasterPlaneTileBrightness=0.72
OfflineRasterTileMaxCacheItems=1024
OfflineRasterTileMaxRetries=3
OfflineRasterTileMinimumBytes=1024
OfflineRasterTileRetryDelaySeconds=1.0
UseOfflineCesiumSunSky=true
OfflineSunSkySolarTime=13.0
OfflineSunSkySkyLightIntensity=0.45
OfflineSunSkyDirectionalLightIntensity=2.0
; 如果未来接入真实 3D Tiles 离线包，再改为 SwitchTilesetsToLocal=true 并配置 TilesetUrl。
; TilesetUrl=http://127.0.0.1:8070/tileset.json

; HTTP 代理策略：保留系统/命令行代理给 Google/Cesium 在线请求使用，但本机服务必须直连。
; 否则 UE/libcurl 会把 http://127.0.0.1:8870/... 也发到 127.0.0.1:7890，导致奥维瓦片连接失败。
[HTTP]
HttpProxyAddress=127.0.0.1:7890
HttpNoProxy=127.0.0.1,localhost,::1

