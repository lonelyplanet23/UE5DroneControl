# Demo-only MediaMTX configuration for the UE drone information panel.
# Publisher (Jetson or ffmpeg test source): rtsp://<host>:8554/drone-<id>
# UE video_url (browser page, not the raw WHEP endpoint): http://<host>:8889/drone-<id>

rtsp: true
rtspAddress: :8554

webrtc: true
webrtcAddress: :8889
# Current MediaMTX host. If MediaMTX is moved away from the UE/backend,
# replace this with the MediaMTX machine's client-reachable LAN address.
webrtcAdditionalHosts: [192.168.10.30]
webrtcAllowOrigins: ['*']

pathDefaults:
  source: publisher
  # Video is recorded by the MediaMTX host, not by the Jetson or UE process.
  record: true
  recordPath: D:/DroneData/recordings/%path/%Y-%m-%d_%H-%M-%S-%f
  recordFormat: fmp4
  recordPartDuration: 1s
  recordSegmentDuration: 10m
  recordDeleteAfter: 0s

paths:
  all_others: {}
